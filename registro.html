<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <p class="text-center mt-3">
        ¿Ya tienes cuenta? <a href="formulario.html">Inicia sesión</a>
      </p>
      
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 450px;">
    <h3 class="text-center mb-4">Crear Cuenta</h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" placeholder="Tu nombre" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-control" placeholder="Repite la contraseña" required>
      </div>

      <button type="submit" class="btn btn-success w-100">Registrarse</button>
    </form>

    <p class="text-center mt-3">
      ¿Ya tienes cuenta? <a href="formulario.html">Inicia sesión</a>
    </p>
  </div>
</div>

</body>
</html>
