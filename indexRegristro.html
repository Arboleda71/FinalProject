<body class=" d-flex justify-content-center align-items-center min-vh-100">

            <div class="col align-self-center">
                <div class="card">

                        <h3 class="text-center mb-4">Registro</h3>
                        <form>
                            <form>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="floatingInput"
                                        placeholder="name@example.com">

                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="floatingInput"
                                        placeholder="name@example.com">
                                    <label for="floatingInput">Segundo nombre</label>
                                </div>
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="floatingPassword"
                                        placeholder="Password">
                                    <label for="floatingPassword">Email</label>
                                </div>

                                <div class="form-floating mt-3">
                                    <input type="password" class="form-control" id="floatingPassword"
                                        placeholder="Password">

                                </div>
                                <div class="form-floating mt-3">
                                    <input type="email" class="form-control" id="floatingInput"
                                        placeholder="name@example.com">

                                </div>
                                <div class="d-grid gap-2 col-6 mx-auto">
                                    
                                    <button class="btn btn-dark mt-3" type="button">Crear cuenta</button>
                                </div>
                                <div class="mt-3">
                                    <p>¿Ya tienes una cuenta?<a href="#" class=" link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover"> Iniciar sesión</a></p>

            </div>
